<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NÉXUS • DARK MOON</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
</head>
<body>
  <div class="game-wrapper">
    <div id="overworld-container" class="game-container active"></div>
    <div id="battle-container" class="game-container"></div>
  </div>

  <!-- Виртуальное управление для телефона -->
  <div class="virtual-controls">
    <div class="dpad">
      <button onclick="moveDir('up')">↑</button>
      <button onclick="moveDir('left')">←</button>
      <button onclick="moveDir('down')">↓</button>
      <button onclick="moveDir('right')">→</button>
    </div>
    <div class="action-buttons">
      <button class="a-btn" onclick="actionA()">A</button>
      <button class="b-btn" onclick="actionB()">B</button>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/overworld.js"></script>
  <script src="js/battle.js"></script>

  <script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
    Telegram.WebApp.requestFullscreen();
  </script>
</body>
</html>
